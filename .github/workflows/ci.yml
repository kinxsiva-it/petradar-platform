name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: petradar
          POSTGRES_USER: petradar
          POSTGRES_PASSWORD: petradar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U petradar -d petradar"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://petradar:petradar@localhost:5432/petradar?schema=public
      - run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://petradar:petradar@localhost:5432/petradar?schema=public
          NODE_ENV: test
      - run: pnpm exec playwright install --with-deps chromium
      - run: corepack pnpm nx cleanup-safety web-e2e
        env:
          NX_DAEMON: 'false'
      - run: corepack pnpm nx e2e web-e2e
        env:
          DATABASE_URL: postgresql://petradar:petradar@localhost:5432/petradar?schema=public
          JWT_ACCESS_SECRET: petradar-ci-access-secret-not-for-production
          JWT_REFRESH_SECRET: petradar-ci-refresh-secret-not-for-production
          LOCATION_OBFUSCATION_SECRET: petradar-ci-location-secret-not-for-production
          NODE_ENV: test
          NX_DAEMON: 'false'
