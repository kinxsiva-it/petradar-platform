<section class="analytics-page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Reports and analytics dashboard</p>
      <h1>Analytics Dashboard</h1>
      <p>Operational aggregates returned by the protected analytics API.</p>
    </div>
    <section class="filter-row" aria-label="Analytics actions">
      <button type="button" (click)="loadAnalytics()">Retry</button>
    </section>
  </header>

  @if (uiState() === 'loading') {
    <section class="panel"><pr-loading-skeleton [rows]="10" /></section>
  } @else if (uiState() === 'error') {
    <pr-empty-state title="Analytics unavailable" [description]="errorMessage()" icon="!" />
  } @else if (!hasData()) {
    <pr-empty-state title="No analytics data" description="The analytics API returned no aggregate rows." icon="0" />
  } @else {
    <pr-analytics-summary-grid [metrics]="metrics()" />
    <section class="chart-grid">
      <pr-distribution-chart title="Sightings by Species" description="Backend sighting counts grouped by species." [segments]="speciesSegments()" />
      <pr-distribution-chart title="Sightings by Status" description="Backend sighting counts grouped by lifecycle status." [segments]="sightingStatusSegments()" />
      <pr-distribution-chart title="Rescue Cases by Status" description="Backend rescue case counts grouped by status." [segments]="rescueStatusSegments()" />
    </section>
  }
</section>
