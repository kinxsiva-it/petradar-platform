<div class="public-layout">
  <header class="public-header">
    <a routerLink="/" class="brand" aria-label="PetRadar home">
      <span aria-hidden="true">P</span>
      PetRadar
    </a>

    <nav class="primary-nav" aria-label="Public navigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        How it works
      </a>
      <a routerLink="/map">Map</a>
      <a routerLink="/lost-pets">Lost Pets</a>
      <a routerLink="/community-guidelines">Resources</a>
    </nav>

    <nav class="auth-nav" aria-label="Account navigation">
      <a routerLink="/login">Log in</a>
      <a routerLink="/register" class="signup-link">Sign up</a>
    </nav>
  </header>

  <main class="public-main">
    <router-outlet />
  </main>

  <footer class="public-footer">
    <span>PetRadar UI prototype</span>
    <span>Privacy-first community reporting</span>
  </footer>
</div>
