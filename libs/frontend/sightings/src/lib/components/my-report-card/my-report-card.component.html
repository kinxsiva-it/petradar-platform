<article class="report-card">
  <img [src]="report().photoUrls[0]" [alt]="report().title" />
  <div class="report-body">
    <div class="report-top">
      <div>
        <p>{{ report().reference }}</p>
        <h2>{{ report().title }}</h2>
      </div>
      <pr-status-badge
        [label]="report().verificationStatus"
        [tone]="tone(report().verificationStatus)"
      />
    </div>
    <dl>
      <div>
        <dt>Species</dt>
        <dd>{{ report().species }}</dd>
      </div>
      <div>
        <dt>Seen</dt>
        <dd>{{ report().seenAt }}</dd>
      </div>
      <div>
        <dt>Urgency</dt>
        <dd>{{ report().urgency }}</dd>
      </div>
      <div>
        <dt>Status</dt>
        <dd>{{ report().lifecycleStatus }}</dd>
      </div>
      <div>
        <dt>Area</dt>
        <dd>{{ report().approximateLocationLabel }}</dd>
      </div>
    </dl>
    <div class="report-actions">
      <a [routerLink]="['/sightings', report().id]">View</a>
      <button type="button" [disabled]="!report().editable" (click)="editRequested.emit(report())">
        {{ report().editable ? 'Edit' : 'Edit unavailable' }}
      </button>
    </div>
  </div>
</article>
