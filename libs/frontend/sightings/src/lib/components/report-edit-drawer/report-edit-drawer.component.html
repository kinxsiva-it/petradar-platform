<button
  type="button"
  class="drawer-backdrop"
  aria-label="Close edit drawer"
  (click)="closed.emit()"
></button>
<aside class="edit-drawer" role="dialog" aria-modal="true" aria-labelledby="edit-report-title">
  <header>
    <div>
      <p>{{ report().reference }}</p>
      <h2 id="edit-report-title">Edit pending report</h2>
    </div>
    <button type="button" (click)="closed.emit()">Close</button>
  </header>
  <label>
    Color
    <input [(ngModel)]="color" />
  </label>
  <label>
    Pattern
    <input [(ngModel)]="pattern" />
  </label>
  <label>
    Public note
    <textarea rows="5" [(ngModel)]="description"></textarea>
  </label>
  <label>
    Approximate public area
    <input [value]="report().approximateLocationLabel" disabled />
  </label>
  <p class="drawer-note">
    Verified, duplicate, rescue, reunited, rejected, or closed reports are locked by the API.
  </p>
  <footer>
    <button type="button" (click)="save()">Save edit</button>
  </footer>
</aside>
