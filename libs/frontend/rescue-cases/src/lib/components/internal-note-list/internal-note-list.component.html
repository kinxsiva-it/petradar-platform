<section class="notes">
  <h2>Internal notes</h2>
  <p class="internal-label">Internal-only mock notes. This prototype does not enforce backend privacy.</p>
  <label>
    Add note
    <textarea rows="4" [ngModel]="draft()" (ngModelChange)="draft.set($event)"></textarea>
  </label>
  @if (error()) {
    <p class="error">{{ error() }}</p>
  }
  <button type="button" (click)="submit()">Add internal note</button>
  <div class="note-list">
    @for (note of notes(); track note.id) {
      <article>
        <header><strong>{{ note.author }}</strong><span>{{ note.authorRole }}</span></header>
        <p>{{ note.body }}</p>
        <small>{{ note.createdAt }}</small>
      </article>
    } @empty {
      <p class="empty">No internal notes yet.</p>
    }
  </div>
</section>
