<section class="timeline">
  <h2>Case timeline</h2>
  @for (entry of entries(); track entry.id) {
    <article>
      <span aria-hidden="true">{{ entry.internal ? 'I' : 'P' }}</span>
      <div>
        <header>
          <h3>{{ entry.title }}</h3>
          @if (entry.internal) {
            <b>Internal</b>
          }
        </header>
        <p>{{ entry.description }}</p>
        <small>{{ entry.actor }} &middot; {{ entry.occurredAt }}</small>
      </div>
    </article>
  }
</section>
