<article class="match-card">
  <div class="match-body">
    <header>
      <div>
        <strong>Match Score {{ match().score }}%</strong>
        <span>{{ match().levelLabel }} match · {{ match().distanceLabel }}</span>
      </div>
      <b>{{ match().reviewStatusLabel }}</b>
    </header>
    <p>{{ match().seenAt }} · {{ match().approximateLocationLabel }}</p>
    <ul>
      @for (reason of match().reasons; track reason) {
        <li>{{ reason }}</li>
      }
    </ul>
  </div>
  <footer>
    <a [routerLink]="['/matches', match().id]">View match</a>
    <a [routerLink]="['/sightings', match().sighting.id]" class="secondary">View sighting</a>
  </footer>
</article>
