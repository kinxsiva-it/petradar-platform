<article class="availability-card">
  <header>
    <h2>Availability</h2>
    <span>{{ availability().status }}</span>
  </header>
  <p>{{ availability().areaLabel }} · {{ availability().radiusKm }} km radius</p>
  <dl>
    <div><dt>Weekdays</dt><dd>{{ availability().weekdays }}</dd></div>
    <div><dt>Weekend</dt><dd>{{ availability().weekend }}</dd></div>
  </dl>
  <div class="button-row">
    @for (status of statuses; track status) {
      <button type="button" [class.active]="availability().status === status" (click)="statusChanged.emit(status)">
        {{ status }}
      </button>
    }
  </div>
</article>
