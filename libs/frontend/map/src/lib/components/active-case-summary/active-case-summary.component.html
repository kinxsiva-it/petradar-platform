<aside class="summary-card" aria-label="Active map case summary">
  <header>
    <h2>Active cases</h2>
    <p>{{ summary().total }} cases found</p>
  </header>

  <dl>
    <div class="cat"><dt><span aria-hidden="true">C</span>Cats</dt><dd>{{ summary().cats }}</dd></div>
    <div class="dog"><dt><span aria-hidden="true">D</span>Dogs</dt><dd>{{ summary().dogs }}</dd></div>
    <div class="other"><dt><span aria-hidden="true">O</span>Other animals</dt><dd>{{ summary().other }}</dd></div>
    <div class="injured"><dt><span aria-hidden="true">!</span>Injured</dt><dd>{{ summary().injured }}</dd></div>
    <div class="match"><dt><span aria-hidden="true">*</span>Possible match</dt><dd>{{ summary().matches }}</dd></div>
    <div class="rescue"><dt><span aria-hidden="true">+</span>Rescue needed</dt><dd>{{ summary().rescue }}</dd></div>
    <div class="reunited"><dt><span aria-hidden="true">R</span>Reunited</dt><dd>{{ summary().reunited }}</dd></div>
  </dl>

  <button type="button" (click)="viewAll.emit()">View all cases <span aria-hidden="true">></span></button>
</aside>
