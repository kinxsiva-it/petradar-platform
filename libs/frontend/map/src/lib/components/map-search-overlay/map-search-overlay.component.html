<label class="search-box">
  <span class="search-icon" aria-hidden="true">
    <svg lucideSearch size="20" strokeWidth="2.2"></svg>
  </span>
  <span class="sr-only">Search map cases</span>
  <input
    type="search"
    [ngModel]="query()"
    (ngModelChange)="queryChanged.emit($event)"
    placeholder="Search by pet, breed, color, area, or landmark..."
  />
  <button type="button" (click)="filtersOpened.emit()" aria-label="Open advanced filters">
    <svg
      lucideSlidersHorizontal
      class="filter-icon"
      size="20"
      strokeWidth="2.2"
      aria-hidden="true"
    ></svg>
  </button>
</label>
